# Конфигурация Nginx для sbor.team
# 
# Этот файл содержит пример конфигурации Nginx для корректной работы приложения,
# включая загрузку файлов через Livewire.
#
# Установка:
# 1. Скопируйте этот файл в /etc/nginx/sites-available/sbor.team
# 2. Отредактируйте пути и домен
# 3. Создайте symlink: ln -s /etc/nginx/sites-available/sbor.team /etc/nginx/sites-enabled/
# 4. Проверьте конфигурацию: nginx -t
# 5. Перезапустите nginx: systemctl restart nginx

server {
    listen 80;
    listen [::]:80;
    
    # Укажите ваш домен
    server_name sbor.team www.sbor.team;
    
    # Корневая директория проекта
    root /var/www/sbor.team/public;
    index index.php index.html;
    
    # === ВАЖНО: Лимит для загрузки файлов ===
    # Увеличиваем максимальный размер тела запроса
    # Для загрузки логотипов, аватаров и других файлов
    client_max_body_size 10M;
    
    # Логирование
    error_log /var/log/nginx/sbor.team-error.log;
    access_log /var/log/nginx/sbor.team-access.log;
    
    # Безопасность: скрываем версию nginx
    server_tokens off;
    
    # Обработка Livewire загрузок файлов
    location ~ ^/livewire/upload-file {
        client_max_body_size 10M;
        
        try_files $uri $uri/ /index.php?$query_string;
        
        proxy_buffering off;
        proxy_request_buffering off;
        
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;  # Или ваш сокет/порт PHP-FPM
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        
        # Увеличиваем таймауты для больших файлов
        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
    }
    
    # Стандартная обработка PHP
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;  # Или ваш сокет/порт PHP-FPM
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        
        # Лимиты для PHP
        fastcgi_param PHP_VALUE "upload_max_filesize=10M \n post_max_size=10M \n max_execution_time=300";
    }
    
    # Запрет доступа к скрытым файлам
    location ~ /\. {
        deny all;
    }
    
    # Запрет доступа к файлам конфигурации
    location ~ \.(env|gitignore|gitattributes|lock)$ {
        deny all;
    }
    
    # Кэширование статических файлов
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    
    # Главный location
    location / {
        try_files $uri $uri/ /index.php?$query_string;
        
        # CORS заголовки (если нужно)
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }
}

# HTTPS конфигурация (рекомендуется)
