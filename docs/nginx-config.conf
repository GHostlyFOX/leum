    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    
    server_name sbor.team www.sbor.team;
    root /var/www/sbor.team/public;
    index index.php index.html;
    
    # SSL сертификаты (укажите свои пути)
    # ssl_certificate /etc/letsencrypt/live/sbor.team/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/sbor.team/privkey.pem;
    
    # === ВАЖНО: Лимит для загрузки файлов ===
    client_max_body_size 10M;
    
    # Остальная конфигурация аналогична HTTP
    # ...
}
