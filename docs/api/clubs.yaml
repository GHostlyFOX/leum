paths:
  /clubs:
    get:
      tags:
        - Clubs
      summary: Список клубов
      description: Получить список клубов с фильтрацией и пагинацией
      security:
        - BearerAuth: []
      parameters:
        - name: sport_type_id
          in: query
          description: Фильтр по виду спорта
          schema:
            type: integer
        - name: country_id
          in: query
          description: Фильтр по стране
          schema:
            type: integer
        - name: city_id
          in: query
          description: Фильтр по городу
          schema:
            type: integer
        - name: search
          in: query
          description: Поиск по названию клуба
          schema:
            type: string
            example: "ЦСКА"
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 15
      responses:
        '200':
          description: Список клубов
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Club'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'

    post:
      tags:
        - Clubs
      summary: Создать новый клуб
      description: Создание нового спортивного клуба с логотипом
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - name
                - sport_type_id
                - country_id
                - city_id
                - club_type_id
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 255
                  example: "ЦСКА Москва"
                description:
                  type: string
                  nullable: true
                  example: "Спортивный клуб по футболу"
                sport_type_id:
                  type: integer
                  example: 1
                country_id:
                  type: integer
                  example: 1
                city_id:
                  type: integer
                  example: 1
                club_type_id:
                  type: integer
                  description: Тип клуба (из справочника)
                  example: 1
                logo:
                  type: string
                  format: binary
                  description: Логотип клуба (JPG, PNG)
      responses:
        '201':
          description: Клуб успешно создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClubDetail'
        '422':
          description: Ошибка валидации
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  errors:
                    type: object

  /clubs/{id}:
    get:
      tags:
        - Clubs
      summary: Получить клуб по ID
      description: Получить полную информацию о клубе
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Информация о клубе
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClubDetail'
        '404':
          description: Клуб не найден

    put:
      tags:
        - Clubs
      summary: Обновить клуб
      description: Частичное обновление данных клуба
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 255
                description:
                  type: string
                  nullable: true
                sport_type_id:
                  type: integer
                country_id:
                  type: integer
                city_id:
                  type: integer
                club_type_id:
                  type: integer
                logo:
                  type: string
                  format: binary
      responses:
        '200':
          description: Клуб успешно обновлен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClubDetail'
        '404':
          description: Клуб не найден

    delete:
      tags:
        - Clubs
      summary: Удалить клуб
      description: Удаление клуба из системы
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Клуб успешно удален
        '404':
          description: Клуб не найден

components:
  schemas:
    Club:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        sport_type_id:
          type: integer
        country_id:
          type: integer
        city_id:
          type: integer
        club_type_id:
          type: integer
        logo_url:
          type: string
          nullable: true
          format: uri
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ClubDetail:
      allOf:
        - $ref: '#/components/schemas/Club'
        - type: object
          properties:
            description:
              type: string
              nullable: true
            sport_type:
              $ref: '#/components/schemas/SportType'
            country:
              $ref: '#/components/schemas/Country'
            city:
              $ref: '#/components/schemas/City'
            club_type:
              $ref: '#/components/schemas/ClubType'
            teams_count:
              type: integer
              description: Количество команд в клубе

    SportType:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string

    Country:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
          example: "Россия"
        code:
          type: string
          example: "RU"

    City:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
          example: "Москва"
        country_id:
          type: integer

    ClubType:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
          example: "Профессиональный"

    PaginationMeta:
      type: object
      properties:
        total:
          type: integer
        per_page:
          type: integer
        current_page:
          type: integer
        last_page:
          type: integer
        from:
          type: integer
        to:
          type: integer
