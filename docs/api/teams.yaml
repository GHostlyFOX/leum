paths:
  /clubs/{clubId}/teams:
    get:
      tags:
        - Teams
      summary: Список команд клуба
      description: Получить список всех команд конкретного клуба с пагинацией
      security:
        - BearerAuth: []
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 15
      responses:
        '200':
          description: Список команд
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Team'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '404':
          description: Клуб не найден

    post:
      tags:
        - Teams
      summary: Создать новую команду
      description: Создание команды в клубе
      security:
        - BearerAuth: []
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - gender
                - birth_year
                - sport_type_id
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 255
                  example: "U-12 Мальчики"
                gender:
                  type: string
                  enum: ["boys", "girls", "mixed"]
                  example: "boys"
                birth_year:
                  type: integer
                  description: Год рождения игроков (для возрастной категории)
                  example: 2012
                sport_type_id:
                  type: integer
                  example: 1
                description:
                  type: string
                  nullable: true
                  example: "Основная команда под-12"
      responses:
        '201':
          description: Команда успешно создана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamDetail'
        '404':
          description: Клуб не найден

  /teams/{id}:
    get:
      tags:
        - Teams
      summary: Получить команду по ID
      description: Получить полную информацию о команде
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Информация о команде
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamDetail'
        '404':
          description: Команда не найдена

    put:
      tags:
        - Teams
      summary: Обновить команду
      description: Частичное обновление данных команды
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 255
                gender:
                  type: string
                  enum: ["boys", "girls", "mixed"]
                birth_year:
                  type: integer
                sport_type_id:
                  type: integer
                description:
                  type: string
                  nullable: true
      responses:
        '200':
          description: Команда успешно обновлена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamDetail'
        '404':
          description: Команда не найдена

    delete:
      tags:
        - Teams
      summary: Удалить команду
      description: Удаление команды из системы
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Команда успешно удалена
        '404':
          description: Команда не найдена

  /teams/{teamId}/members:
    post:
      tags:
        - Teams
      summary: Добавить члена команды
      description: Добавить пользователя в команду с определенной ролью
      security:
        - BearerAuth: []
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user_id
                - club_id
                - role_id
              properties:
                user_id:
                  type: integer
                  description: ID пользователя
                  example: 5
                club_id:
                  type: integer
                  description: ID клуба
                  example: 1
                role_id:
                  type: integer
                  description: ID роли (из справочника)
                  example: 1
                joined_at:
                  type: string
                  format: date
                  description: Дата присоединения (опционально)
                  nullable: true
      responses:
        '201':
          description: Член команды успешно добавлен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamMember'
        '404':
          description: Команда или пользователь не найдены
        '422':
          description: Ошибка валидации

components:
  schemas:
    Team:
      type: object
      properties:
        id:
          type: integer
        club_id:
          type: integer
        name:
          type: string
        gender:
          type: string
          enum: ["boys", "girls", "mixed"]
        birth_year:
          type: integer
        sport_type_id:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    TeamDetail:
      allOf:
        - $ref: '#/components/schemas/Team'
        - type: object
          properties:
            description:
              type: string
              nullable: true
            club:
              $ref: '#/components/schemas/Club'
            sport_type:
              $ref: '#/components/schemas/SportType'
            members_count:
              type: integer
              description: Количество членов команды

    Club:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string

    SportType:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string

    TeamMember:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        team_id:
          type: integer
        club_id:
          type: integer
        role_id:
          type: integer
        role:
          $ref: '#/components/schemas/UserRole'
        user:
          $ref: '#/components/schemas/User'
        joined_at:
          type: string
          format: date
        created_at:
          type: string
          format: date-time

    User:
      type: object
      properties:
        id:
          type: integer
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
          format: email

    UserRole:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string

    PaginationMeta:
      type: object
      properties:
        total:
          type: integer
        per_page:
          type: integer
        current_page:
          type: integer
        last_page:
          type: integer
        from:
          type: integer
        to:
          type: integer
