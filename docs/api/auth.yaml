paths:
  /auth/register:
    post:
      tags:
        - Auth
      summary: Регистрация нового пользователя
      description: Создает новый аккаунт и возвращает токен доступа
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - first_name
                - last_name
                - email
                - password
                - password_confirmation
                - birth_date
                - gender
              properties:
                first_name:
                  type: string
                  example: "Иван"
                  minLength: 1
                  maxLength: 255
                last_name:
                  type: string
                  example: "Петров"
                  minLength: 1
                  maxLength: 255
                email:
                  type: string
                  format: email
                  example: "ivan@example.com"
                password:
                  type: string
                  format: password
                  example: "password123"
                  minLength: 8
                password_confirmation:
                  type: string
                  format: password
                  example: "password123"
                birth_date:
                  type: string
                  format: date
                  example: "2010-05-15"
                gender:
                  type: string
                  enum: ["male", "female"]
                  example: "male"
      responses:
        '201':
          description: Пользователь успешно зарегистрирован
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
                  token:
                    type: string
                    example: "1|laravel_sanctum_token_here"
                    description: Bearer token для аутентификации
        '422':
          description: Ошибка валидации
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  errors:
                    type: object
                    additionalProperties:
                      type: array
                      items:
                        type: string

  /auth/login:
    post:
      tags:
        - Auth
      summary: Вход в аккаунт
      description: Аутентификация пользователя по email и пароль
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - login
                - password
              properties:
                login:
                  type: string
                  description: Email или username
                  example: "ivan@example.com"
                password:
                  type: string
                  format: password
                  example: "password123"
      responses:
        '200':
          description: Успешная аутентификация
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
                  token:
                    type: string
                    example: "1|laravel_sanctum_token_here"
                    description: Bearer token для аутентификации
        '401':
          description: Неверные учетные данные
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Invalid credentials"

  /auth/logout:
    post:
      tags:
        - Auth
      summary: Выход из аккаунта
      description: Завершает сеанс и инвалидирует токен
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Успешный выход
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Successfully logged out"
        '401':
          description: Не аутентифицирован
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Unauthenticated"

components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        first_name:
          type: string
          example: "Иван"
        last_name:
          type: string
          example: "Петров"
        email:
          type: string
          format: email
          example: "ivan@example.com"
        birth_date:
          type: string
          format: date
          example: "2010-05-15"
        gender:
          type: string
          enum: ["male", "female"]
          example: "male"
        created_at:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00Z"
        updated_at:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00Z"
