openapi: 3.0.3
info:
  title: Детская лига — User API
  description: Управление пользователями, профилями игроков и тренеров
  version: 2.0.0

servers:
  - url: /api/v1

tags:
  - name: User
    description: Пользователи и профили
  - name: Player
    description: Игроки (профили игроков)
  - name: Coach
    description: Тренеры (профили тренеров)

paths:
  # ── Текущий пользователь ────────────────────────────────────────
  /me:
    get:
      tags: [User]
      summary: Текущий пользователь
      operationId: me
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Данные текущего пользователя
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/UserFull'
                  role:
                    type: string
                    enum: [super_admin, admin, coach, parent, player]
                  permissions:
                    type: array
                    items:
                      type: string
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ── Пользователи ────────────────────────────────────────────────
  /users:
    get:
      tags: [User]
      summary: Список пользователей
      operationId: listUsers
      security:
        - bearerAuth: []
      parameters:
        - name: search
          in: query
          schema:
            type: string
          description: Поиск по имени, email или телефону
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Пагинированный список пользователей
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPaginated'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /users/{id}:
    get:
      tags: [User]
      summary: Профиль пользователя
      operationId: showUser
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: Данные пользователя с профилями
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserFull'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [User]
      summary: Обновить пользователя
      operationId: updateUser
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: Пользователь обновлён
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserFull'
        '422':
          $ref: '#/components/responses/ValidationError'

  /users/{id}/player-profile:
    post:
      tags: [User]
      summary: Создать профиль игрока
      operationId: createPlayerProfile
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePlayerProfileRequest'
      responses:
        '201':
          description: Профиль игрока создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayerProfile'
        '422':
          $ref: '#/components/responses/ValidationError'

  /users/{id}/coach-profile:
    post:
      tags: [User]
      summary: Создать профиль тренера
      operationId: createCoachProfile
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCoachProfileRequest'
      responses:
        '201':
          description: Профиль тренера создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CoachProfile'
        '422':
          $ref: '#/components/responses/ValidationError'

  # ── Игроки (/players) ───────────────────────────────────────────
  /players:
    get:
      tags: [Player]
      summary: Список игроков
      operationId: listPlayers
      security:
        - bearerAuth: []
      parameters:
        - name: sport_type_id
          in: query
          schema:
            type: integer
          description: Фильтр по виду спорта
        - name: club_id
          in: query
          schema:
            type: integer
          description: Фильтр по клубу
        - name: team_id
          in: query
          schema:
            type: integer
          description: Фильтр по команде
        - name: search
          in: query
          schema:
            type: string
          description: Поиск по имени/фамилии
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Пагинированный список игроков
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayerPaginated'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /players/{id}:
    get:
      tags: [Player]
      summary: Профиль игрока
      operationId: showPlayer
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PlayerId'
      responses:
        '200':
          description: Профиль игрока с пользователем и справочниками
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayerProfileFull'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Player]
      summary: Обновить профиль игрока
      operationId: updatePlayer
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PlayerId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePlayerProfileRequest'
      responses:
        '200':
          description: Профиль обновлён
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayerProfileFull'
        '422':
          $ref: '#/components/responses/ValidationError'

    delete:
      tags: [Player]
      summary: Удалить профиль игрока
      operationId: deletePlayer
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PlayerId'
      responses:
        '200':
          description: Профиль удалён
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Профиль игрока удалён
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Тренеры (/coaches) ──────────────────────────────────────────
  /coaches:
    get:
      tags: [Coach]
      summary: Список тренеров
      operationId: listCoaches
      security:
        - bearerAuth: []
      parameters:
        - name: sport_type_id
          in: query
          schema:
            type: integer
          description: Фильтр по виду спорта
        - name: club_id
          in: query
          schema:
            type: integer
          description: Фильтр по клубу
        - name: search
          in: query
          schema:
            type: string
          description: Поиск по имени/фамилии
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Пагинированный список тренеров
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CoachPaginated'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /coaches/{id}:
    get:
      tags: [Coach]
      summary: Профиль тренера
      operationId: showCoach
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CoachId'
      responses:
        '200':
          description: Профиль тренера с пользователем и справочниками
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CoachProfileFull'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Coach]
      summary: Обновить профиль тренера
      operationId: updateCoach
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CoachId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCoachProfileRequest'
      responses:
        '200':
          description: Профиль обновлён
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CoachProfileFull'
        '422':
          $ref: '#/components/responses/ValidationError'

    delete:
      tags: [Coach]
      summary: Удалить профиль тренера
      operationId: deleteCoach
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CoachId'
      responses:
        '200':
          description: Профиль удалён
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Профиль тренера удалён
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  parameters:
    UserId:
      name: id
      in: path
      required: true
      schema:
        type: integer
    PlayerId:
      name: id
      in: path
      required: true
      schema:
        type: integer
      description: ID профиля игрока (player_profiles.id)
    CoachId:
      name: id
      in: path
      required: true
      schema:
        type: integer
      description: ID профиля тренера (coach_profiles.id)
    PerPage:
      name: per_page
      in: query
      schema:
        type: integer
        default: 15

  responses:
    Unauthorized:
      description: Не авторизован
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
    Forbidden:
      description: Нет прав доступа
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
    NotFound:
      description: Ресурс не найден
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
    ValidationError:
      description: Ошибка валидации
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
              errors:
                type: object
                additionalProperties:
                  type: array
                  items:
                    type: string

  schemas:
    # ── User schemas ──────────────────────────────────────────────
    UserFull:
      type: object
      properties:
        id:
          type: integer
        first_name:
          type: string
        last_name:
          type: string
        middle_name:
          type: string
          nullable: true
        email:
          type: string
        phone:
          type: string
          nullable: true
        birth_date:
          type: string
          format: date
        gender:
          type: string
          enum: [male, female]
        global_role:
          type: string
          enum: [super_admin, admin, coach, parent, player]
        notifications_on:
          type: boolean
        onboarded_at:
          type: string
          format: date-time
          nullable: true
          description: Дата/время завершения онбординга. NULL = онбординг не завершён
        timezone:
          type: string
          nullable: true
          example: Europe/Moscow
          description: Часовой пояс пользователя
        photo_file_id:
          type: integer
          nullable: true
        player_profile:
          $ref: '#/components/schemas/PlayerProfile'
        coach_profile:
          $ref: '#/components/schemas/CoachProfile'
        team_memberships:
          type: array
          items:
            $ref: '#/components/schemas/TeamMembershipShort'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    UserPaginated:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/UserFull'
        current_page:
          type: integer
        last_page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer

    UpdateUserRequest:
      type: object
      properties:
        first_name:
          type: string
          maxLength: 100
        last_name:
          type: string
          maxLength: 100
        middle_name:
          type: string
          maxLength: 100
          nullable: true
        phone:
          type: string
          maxLength: 30
          nullable: true
        birth_date:
          type: string
          format: date
        gender:
          type: string
          enum: [male, female]
        notifications_on:
          type: boolean

    # ── Player schemas ────────────────────────────────────────────
    CreatePlayerProfileRequest:
      type: object
      required: [dominant_foot_id, sport_type_id]
      properties:
        dominant_foot_id:
          type: integer
        position_id:
          type: integer
          nullable: true
        sport_type_id:
          type: integer

    UpdatePlayerProfileRequest:
      type: object
      properties:
        dominant_foot_id:
          type: integer
        position_id:
          type: integer
          nullable: true
        sport_type_id:
          type: integer

    PlayerProfile:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        dominant_foot_id:
          type: integer
        position_id:
          type: integer
          nullable: true
        sport_type_id:
          type: integer

    PlayerProfileFull:
      type: object
      description: Профиль игрока с загруженными связями
      properties:
        id:
          type: integer
        user_id:
          type: integer
        dominant_foot_id:
          type: integer
        position_id:
          type: integer
          nullable: true
        sport_type_id:
          type: integer
        user:
          type: object
          properties:
            id:
              type: integer
            first_name:
              type: string
            last_name:
              type: string
            birth_date:
              type: string
              format: date
            gender:
              type: string
              enum: [male, female]
        dominant_foot:
          $ref: '#/components/schemas/RefItem'
        position:
          $ref: '#/components/schemas/RefItem'
        sport_type:
          $ref: '#/components/schemas/RefItem'

    PlayerPaginated:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/PlayerProfileFull'
        current_page:
          type: integer
        last_page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer

    # ── Coach schemas ─────────────────────────────────────────────
    CreateCoachProfileRequest:
      type: object
      required: [sport_type_id]
      properties:
        sport_type_id:
          type: integer
        specialty_id:
          type: integer
          nullable: true
        career_start:
          type: string
          format: date
          nullable: true
        license_number:
          type: string
          maxLength: 100
          nullable: true
        license_expires:
          type: string
          format: date
          nullable: true
        achievements:
          type: array
          items:
            type: string
          nullable: true

    UpdateCoachProfileRequest:
      type: object
      properties:
        sport_type_id:
          type: integer
        specialty_id:
          type: integer
          nullable: true
        career_start:
          type: string
          format: date
          nullable: true
        license_number:
          type: string
          maxLength: 100
          nullable: true
        license_expires:
          type: string
          format: date
          nullable: true
        achievements:
          type: array
          items:
            type: string
          nullable: true

    CoachProfile:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        sport_type_id:
          type: integer
        specialty_id:
          type: integer
          nullable: true
        career_start:
          type: string
          format: date
          nullable: true
        license_number:
          type: string
          nullable: true
        license_expires:
          type: string
          format: date
          nullable: true
        achievements:
          type: array
          items:
            type: string
          nullable: true

    CoachProfileFull:
      type: object
      description: Профиль тренера с загруженными связями
      properties:
        id:
          type: integer
        user_id:
          type: integer
        sport_type_id:
          type: integer
        specialty_id:
          type: integer
          nullable: true
        career_start:
          type: string
          format: date
          nullable: true
        license_number:
          type: string
          nullable: true
        license_expires:
          type: string
          format: date
          nullable: true
        achievements:
          type: array
          items:
            type: string
          nullable: true
        user:
          type: object
          properties:
            id:
              type: integer
            first_name:
              type: string
            last_name:
              type: string
            birth_date:
              type: string
              format: date
            gender:
              type: string
              enum: [male, female]
        sport_type:
          $ref: '#/components/schemas/RefItem'
        specialty:
          $ref: '#/components/schemas/RefItem'

    CoachPaginated:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/CoachProfileFull'
        current_page:
          type: integer
        last_page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer

    # ── Common schemas ────────────────────────────────────────────
    RefItem:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string

    TeamMembershipShort:
      type: object
      properties:
        team_id:
          type: integer
        club_id:
          type: integer
        role_id:
          type: integer
        joined_at:
          type: string
          format: date
          nullable: true
        is_active:
          type: boolean
