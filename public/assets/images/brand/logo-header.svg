<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80">
  <!-- Icon part - Team figures -->
  <g transform="translate(5, 5)">
    <!-- Circle background -->
    <circle cx="35" cy="35" r="34" fill="#74bc1f"/>
    
    <!-- Center figure (coach/leader) - black -->
    <circle cx="35" cy="28" r="7" fill="#000000"/>
    <path d="M35 37 
             L27 58 
             L33 58 
             L35 47 
             L37 58 
             L43 58 
             Z" fill="#000000"/>
    
    <!-- Left figure - white -->
    <circle cx="17" cy="33" r="5.5" fill="#ffffff"/>
    <path d="M17 40 
             L10 58 
             L15 58 
             L17 49 
             L19 58 
             L24 58 
             Z" fill="#ffffff"/>
    
    <!-- Right figure - white -->
    <circle cx="53" cy="33" r="5.5" fill="#ffffff"/>
    <path d="M53 40 
             L46 58 
             L51 58 
             L53 49 
             L55 58 
             L60 58 
             Z" fill="#ffffff"/>
    
    <!-- Connection ring at bottom -->
    <ellipse cx="35" cy="60" rx="20" ry="5" fill="none" stroke="#000000" stroke-width="1.5" opacity="0.3"/>
  </g>
  
  <!-- Text part: sbor.team -->
  <text x="90" y="48" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#000000">
    sbor<tspan fill="#74bc1f">.team</tspan>
  </text>
</svg>