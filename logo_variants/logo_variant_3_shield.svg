<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="98" fill="#2563EB"/>
  
  <!-- Shield shape -->
  <path d="M100 30 
           L150 50 
           L150 95 
           Q150 140 100 170 
           Q50 140 50 95 
           L50 50 
           Z" 
        fill="white"/>
  
  <!-- Stylized ball inside shield -->
  <circle cx="100" cy="95" r="35" fill="#2563EB"/>
  
  <!-- Ball pattern -->
  <path d="M100 60 L100 75 M100 115 L100 130 
           M65 95 L80 95 M120 95 L135 95
           M75 70 L85 85 M115 70 L125 85
           M75 120 L85 105 M115 120 L125 105" 
        stroke="white" stroke-width="3" fill="none"/>
  
  <!-- Center hexagon -->
  <polygon points="100,82 110,88 110,102 100,108 90,102 90,88" fill="white"/>
</svg>